name: Update Block Registry

on:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      minecraft_version:
        description: 'Specific Minecraft version to use (leave empty for latest)'
        required: false
        default: ''

jobs:
  update-registry:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Fetch Minecraft version
        id: mc_version
        run: |
          if [ -n "${{ github.event.inputs.minecraft_version }}" ]; then
            VERSION="${{ github.event.inputs.minecraft_version }}"
          else
            VERSION=$(curl -s https://launchermeta.mojang.com/mc/game/version_manifest_v2.json | jq -r '.latest.release')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using Minecraft version: $VERSION"

      - name: Download server jar
        run: |
          VERSION="${{ steps.mc_version.outputs.version }}"
          VERSION_URL=$(curl -s https://launchermeta.mojang.com/mc/game/version_manifest_v2.json \
            | jq -r ".versions[] | select(.id==\"$VERSION\") | .url")
          
          if [ -z "$VERSION_URL" ] || [ "$VERSION_URL" = "null" ]; then
            echo "Error: Version $VERSION not found in manifest"
            exit 1
          fi
          
          SERVER_URL=$(curl -s "$VERSION_URL" | jq -r '.downloads.server.url')
          echo "Downloading server.jar from: $SERVER_URL"
          curl -sL -o server.jar "$SERVER_URL"

      - name: Extract blocks.json
        run: |
          java -DbundlerMainClass=net.minecraft.data.Main -jar server.jar --reports --server
          cp generated/reports/blocks.json data/blocks.json
          echo "Extracted blocks.json ($(wc -l < data/blocks.json) lines)"

      - name: Generate Go code
        env:
          MC_VERSION: ${{ steps.mc_version.outputs.version }}
        run: |
          go run tools/gen_blocks.go data/blocks.json > pkg/registry/blocks_generated.go
          gofmt -w pkg/registry/blocks_generated.go

      - name: Verify build
        run: go build ./...

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet pkg/registry/ data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            ADDED=$(git diff --stat pkg/registry/blocks_generated.go | tail -1)
            echo "Changes detected: $ADDED"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          title: "chore: update block registry to Minecraft ${{ steps.mc_version.outputs.version }}"
          commit-message: "chore: update block registry to Minecraft ${{ steps.mc_version.outputs.version }}"
          branch: "auto/block-registry-${{ steps.mc_version.outputs.version }}"
          body: |
            ## Block Registry Update

            Updated block registry data from Minecraft **${{ steps.mc_version.outputs.version }}**.

            This PR was automatically generated by the `update-blocks` workflow.

            ### Changes
            - Updated `data/blocks.json` from the official Minecraft server
            - Regenerated `pkg/registry/blocks_generated.go`

            ### Verification
            - [x] `go build ./...` passed
          labels: |
            automated
            dependencies
